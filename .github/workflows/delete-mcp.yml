name: Delete from MCP Registry

on:
  workflow_dispatch:        # manual trigger only

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC proves gsc-em org ownership
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher (pinned)
        env:
          MCP_PUBLISHER_VERSION: v1.8.0
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" | tar -xz mcp-publisher

      - name: Login via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Status -> deleted (all versions)
        run: |
          echo y | ./mcp-publisher status --status deleted --all-versions \
            --message "CEO ruling 2026-07-19: branding correction, zero commercial value. Superseded by io.github.greencore-solutions/cpg-human-in-the-loop" \
            io.github.gsc-em/aio-agents-mcp
